name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  backend-tests:
    name: Backend Tests (Go)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run backend tests with coverage
        working-directory: ./backend
        run: |
          go mod download
          go build ./...
          go test ./tests/services/... -v -cover -coverpkg=./internal/services/... -coverprofile=coverage.out
          echo "📊 Backend Coverage:"
          go tool cover -func=coverage.out | grep total

      - name: Check backend coverage threshold
        working-directory: ./backend
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Backend coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below 70%"
            exit 1
          fi
          echo "✅ Coverage $COVERAGE% meets threshold"

      - name: Upload backend coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.out
          flags: backend
          name: backend-coverage

  frontend-tests:
    name: Frontend Tests (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: ./frontend
        run: |
          npm test -- --coverage --watchAll=false
          echo "📊 Frontend Coverage Report Generated"

      - name: Upload frontend coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run backend tests for coverage
        working-directory: ./backend
        run: |
          go mod download
          go test ./tests/services/... -v -cover -coverpkg=./internal/services/... -coverprofile=coverage.out

      - name: Run frontend tests for coverage
        working-directory: ./frontend
        run: npm test -- --coverage --watchAll=false

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  cypress-e2e:
    name: Cypress E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Start Backend
        working-directory: ./backend
        run: |
          go run cmd/api/main.go &
          echo $! > backend.pid
          sleep 5
        env:
          PORT: 8080

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          build: npm run build
          start: npm start
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 120
          browser: chrome
          spec: cypress/e2e/blog/*.cy.js

      - name: Stop Backend
        if: always()
        working-directory: ./backend
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
            rm backend.pid
          fi

      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
          if-no-files-found: ignore

      - name: Upload Cypress videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos
          path: frontend/cypress/videos
          if-no-files-found: ignore

  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, sonarcloud, cypress-e2e]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/carpinetioctavio/forum-app-cloud-deploy-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/carpinetioctavio/forum-app-cloud-deploy-frontend:${{ github.sha }}

  deploy-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: github.event_name == 'push'
    environment: qa

    steps:
      - name: Deploy backend to QA
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_BACKEND_QA }}
          IMAGE: ghcr.io/carpinetioctavio/forum-app-cloud-deploy-backend:${{ github.sha }}
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"imageUrl\":\"${IMAGE}\"}")
          echo "Backend QA deploy status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" != "201" ]]; then
            echo "Deploy failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Deploy frontend to QA
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_FRONTEND_QA }}
          IMAGE: ghcr.io/carpinetioctavio/forum-app-cloud-deploy-frontend:${{ github.sha }}
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"imageUrl\":\"${IMAGE}\"}")
          echo "Frontend QA deploy status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" != "201" ]]; then
            echo "Deploy failed with status $HTTP_STATUS"
            exit 1
          fi

  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: [deploy-qa]
    if: github.event_name == 'push'
    environment: prod

    steps:
      - name: Deploy backend to PROD
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_BACKEND_PROD }}
          IMAGE: ghcr.io/carpinetioctavio/forum-app-cloud-deploy-backend:${{ github.sha }}
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"imageUrl\":\"${IMAGE}\"}")
          echo "Backend PROD deploy status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" != "201" ]]; then
            echo "Deploy failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Deploy frontend to PROD
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_FRONTEND_PROD }}
          IMAGE: ghcr.io/carpinetioctavio/forum-app-cloud-deploy-frontend:${{ github.sha }}
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"imageUrl\":\"${IMAGE}\"}")
          echo "Frontend PROD deploy status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" != "201" ]]; then
            echo "Deploy failed with status $HTTP_STATUS"
            exit 1
          fi
