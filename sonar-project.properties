# Project info
sonar.projectKey=CarpinetiOctavio_forum-app-cloud-deploy
sonar.organization=carpinetioctavio

# Name and version
sonar.projectName=forum-app-cloud-deploy
sonar.projectVersion=1.0

# Source directories
sonar.sources=backend,frontend/src

# Exclusions (node_modules and build artifacts only)
sonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/coverage/**

# Tests
sonar.tests=backend/tests,frontend/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*_test.go

# Coverage reports
sonar.go.coverage.reportPaths=backend/coverage.out
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Coverage exclusions (files without unit tests by design)
sonar.coverage.exclusions=\
  backend/cmd/**,\
  backend/internal/handlers/**,\
  backend/internal/repository/**,\
  backend/internal/router/**,\
  backend/internal/database/**,\
  backend/internal/models/**,\
  backend/tests/mocks/**,\
  frontend/src/App.tsx,\
  frontend/src/index.tsx,\
  frontend/src/reportWebVitals.ts,\
  frontend/src/__mocks__/**,\
  frontend/src/types/**

# Encoding
sonar.sourceEncoding=UTF-8
